name: Build IPA

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-15
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.2.app/Contents/Developer

      - name: Print Xcode version
        run: xcodebuild -version

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode Project
        run: xcodegen generate

      - name: Build
        run: |
          xcodebuild build \
            -project ChaosControl.xcodeproj \
            -scheme ChaosControl \
            -configuration Release \
            -sdk iphoneos \
            -destination 'generic/platform=iOS' \
            -derivedDataPath build \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            DEVELOPMENT_TEAM="" \
            AD_HOC_CODE_SIGNING_ALLOWED=YES \
            2>&1 | tee build.log

          # Fail if build actually failed
          if grep -q "BUILD FAILED" build.log; then
            echo "::error::Build failed. See log above."
            exit 1
          fi

      - name: Package IPA
        run: |
          # Find the .app bundle
          APP_PATH=$(find build/Build/Products/Release-iphoneos -name "*.app" -type d | head -1)
          echo "Found app at: $APP_PATH"

          if [ -z "$APP_PATH" ]; then
            echo "ERROR: No .app found"
            exit 1
          fi

          # Create Payload directory and package as IPA
          mkdir -p Payload
          cp -r "$APP_PATH" Payload/
          zip -r ChaosControl.ipa Payload
          rm -rf Payload

          echo "IPA created successfully"
          ls -la ChaosControl.ipa

      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ChaosControl-IPA
          path: ChaosControl.ipa
          retention-days: 90

      - name: Update AltStore source JSON
        if: github.event_name == 'push' && (github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main')
        run: |
          IPA_SIZE=$(stat -f%z ChaosControl.ipa 2>/dev/null || stat -c%s ChaosControl.ipa)
          BUILD_DATE=$(date -u +"%Y-%m-%dT%H:%M:%S+00:00")
          BUILD_NUM="${{ github.run_number }}"

          cat > altstore-source.json << ENDJSON
          {
            "name": "Chaos Control",
            "identifier": "com.chaoscontrol.source",
            "sourceURL": "https://raw.githubusercontent.com/sbruschke/ChaosControl/main/altstore-source.json",
            "apps": [
              {
                "name": "Chaos Control",
                "bundleIdentifier": "com.chaoscontrol.app",
                "developerName": "sbruschke",
                "version": "0.1.${BUILD_NUM}",
                "versionDate": "${BUILD_DATE}",
                "versionDescription": "Build #${BUILD_NUM}",
                "downloadURL": "https://github.com/sbruschke/ChaosControl/releases/latest/download/ChaosControl.ipa",
                "localizedDescription": "Insulin management app for iOS.",
                "iconURL": "",
                "size": ${IPA_SIZE}
              }
            ],
            "news": []
          }
          ENDJSON

          # Remove leading whitespace from heredoc
          python3 -c "
          import json, sys
          with open('altstore-source.json') as f:
              data = json.load(f)
          with open('altstore-source.json', 'w') as f:
              json.dump(data, f, indent=2)
          "

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add altstore-source.json
          git diff --cached --quiet || git commit -m "Update AltStore source [skip ci]" && git push

      - name: Create Release (on push to master/main)
        if: github.event_name == 'push' && (github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.run_number }}
          name: "Build #${{ github.run_number }}"
          body: |
            Automated build from commit ${{ github.sha }}

            **Download the IPA below and install via LiveContainer.**

            **LiveContainer source:** `https://raw.githubusercontent.com/sbruschke/ChaosControl/main/altstore-source.json`
          files: ChaosControl.ipa
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
