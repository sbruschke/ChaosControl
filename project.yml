name: ChaosControl
options:
  bundleIdPrefix: com.chaoscontrol
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"
  generateEmptyDirectories: true

settings:
  base:
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_IDENTITY: ""
    CODE_SIGNING_REQUIRED: "NO"
    CODE_SIGNING_ALLOWED: "NO"
    SWIFT_VERSION: "5.9"

targets:
  ChaosControl:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: ChaosControl
        excludes:
          - "Resources/Assets.xcassets"
          - "Resources/ShadowMonoRegular.ttf"
    resources:
      - path: ChaosControl/Resources/Assets.xcassets
      - path: ChaosControl/Resources/ShadowMonoRegular.ttf
    info:
      path: ChaosControl/Info.plist
    entitlements:
      path: ChaosControl/ChaosControl.entitlements
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.chaoscontrol.app
        INFOPLIST_FILE: ChaosControl/Info.plist
        PRODUCT_NAME: ChaosControl
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        TARGETED_DEVICE_FAMILY: "1"
        SUPPORTS_MAC_DESIGNED_FOR_IPHONE_IPAD: "NO"
        CODE_SIGN_IDENTITY: ""
        CODE_SIGNING_REQUIRED: "NO"
        CODE_SIGNING_ALLOWED: "NO"
        DEVELOPMENT_TEAM: ""
